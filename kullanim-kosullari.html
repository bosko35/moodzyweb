<!DOCTYPE html>
<html class="dark" lang="tr">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Kullanım Şartları | Moodzy</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#0e0e12",
            primary: "#ba9eff"
          },
          fontFamily: {
            headline: ["Space Grotesk", "sans-serif"],
            body: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: "Inter", sans-serif; background: #0e0e12; color: #f9f5fc; }
    .glass-panel { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(22px); }
  </style>
</head>
<body class="bg-background text-text selection:bg-primary selection:text-black">
  <header class="border-b border-white/10 bg-[#0e0e12]/70 px-4 py-4 backdrop-blur-2xl sm:px-6 lg:px-8">
    <div class="mx-auto flex max-w-7xl items-center justify-between">
      <a class="font-headline text-2xl font-bold tracking-tight" href="index.html">Moodzy</a>
      <div class="flex items-center gap-4">
        <select id="lang-selector" class="rounded-xl border-white/10 bg-white/5 px-3 py-1.5 text-sm text-white/80 focus:border-primary focus:ring-primary cursor-pointer hover:bg-white/10 transition-colors">
          <option class="bg-[#14141c] text-white" value="tr">Türkçe</option>
          <option class="bg-[#14141c] text-white" value="en">English</option>
          <option class="bg-[#14141c] text-white" value="es">Español</option>
          <option class="bg-[#14141c] text-white" value="pt">Português</option>
          <option class="bg-[#14141c] text-white" value="fr">Français</option>
          <option class="bg-[#14141c] text-white" value="id">Bahasa Indonesia</option>
          <option class="bg-[#14141c] text-white" value="fil">Filipino</option>
          <option class="bg-[#14141c] text-white" value="th">ไทย</option>
          <option class="bg-[#14141c] text-white" value="hi">हिन्दी</option>
          <option class="bg-[#14141c] text-white" value="ar">العربية</option>
        </select>
        <a class="text-sm font-medium text-white/70 transition hover:text-white" href="index.html" id="back-btn">Geri Dön</a>
      </div>
    </div>
  </header>
  <main class="px-4 py-16 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-3xl glass-panel rounded-[2rem] p-6 sm:p-12">
      <div class="space-y-6 text-sm leading-relaxed text-white/80 whitespace-pre-wrap" id="terms-content">Yükleniyor... / Loading...</div>
    </div>
  </main>
  <script src="policy-translations.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const langSelector = document.getElementById("lang-selector");
      const contentContainer = document.getElementById("terms-content");
      const backBtn = document.getElementById("back-btn");
      const pageTitle = document.querySelector("title");

      const uiTranslations = {
        tr: { back: "Geri Dön", title: "Kullanım Şartları | Moodzy" },
        en: { back: "Go Back", title: "Terms of Use | Moodzy" },
        es: { back: "Volver", title: "Términos de Uso | Moodzy" },
        pt: { back: "Voltar", title: "Termos de Uso | Moodzy" },
        fr: { back: "Retour", title: "Conditions d'Utilisation | Moodzy" },
        id: { back: "Kembali", title: "Ketentuan Penggunaan | Moodzy" },
        fil: { back: "Bumalik", title: "Mga Tuntunin sa Paggamit | Moodzy" },
        th: { back: "ย้อนกลับ", title: "ข้อกำหนดการใช้งาน | Moodzy" },
        hi: { back: "वापस जाएं", title: "उपयोग की शर्तें | Moodzy" },
        ar: { back: "العودة", title: "شروط الاستخدام | Moodzy" }
      };

      const supportedLangs = ["tr", "en", "es", "pt", "fr", "id", "fil", "th", "hi", "ar"];

      function getLanguage() {
        const urlParams = new URLSearchParams(window.location.search);
        let lang = urlParams.get("lang");
        if (lang && supportedLangs.includes(lang.toLowerCase())) {
          return lang.toLowerCase();
        }

        lang = localStorage.getItem("preferred_lang");
        if (lang && supportedLangs.includes(lang.toLowerCase())) {
          return lang.toLowerCase();
        }

        const browserLangs = navigator.languages || [navigator.language || navigator.userLanguage];
        for (let bLang of browserLangs) {
          bLang = bLang.split("-")[0].toLowerCase();
          if (supportedLangs.includes(bLang)) {
            return bLang;
          }
        }

        return "tr";
      }

      function updateLanguage(lang) {
        localStorage.setItem("preferred_lang", lang);
        langSelector.value = lang;

        if (window.policyTranslations && window.policyTranslations.terms && window.policyTranslations.terms[lang]) {
          contentContainer.textContent = window.policyTranslations.terms[lang];
        } else {
          contentContainer.textContent = "Yükleniyor... / Loading...";
        }

        const ui = uiTranslations[lang] || uiTranslations.tr;
        if (backBtn) backBtn.textContent = ui.back;
        if (pageTitle) pageTitle.textContent = ui.title;

        if (lang === "ar") {
          document.documentElement.dir = "rtl";
          document.documentElement.lang = "ar";
          contentContainer.classList.add("text-right");
          contentContainer.classList.remove("text-left");
        } else {
          document.documentElement.dir = "ltr";
          document.documentElement.lang = lang;
          contentContainer.classList.remove("text-right");
          contentContainer.classList.add("text-left");
        }
      }

      langSelector.addEventListener("change", (e) => {
        updateLanguage(e.target.value);
      });

      const initialLang = getLanguage();
      updateLanguage(initialLang);
    });
  </script>
</body>
</html>
